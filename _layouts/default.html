<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #2c2c2c;
      --muted: #7a7060;
      --link: #5c4a1e;
      --link-hover: #8b6914;
      --border: #d9d0bf;
      --bg: #f7f3ec;
      --code-bg: #ede8de;
      --max-width: 740px;
      --font: 'Roboto Mono', monospace;
    }

    body {
      font-family: var(--font);
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--text);
      background: var(--bg);
      padding: 0 1.5rem;
    }

    header {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    header .site-title {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
      text-transform: uppercase;
    }

    header .site-title:hover { color: var(--link-hover); }

    header .github-link {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
    }

    header .github-link:hover { color: var(--link-hover); }

    main {
      max-width: var(--max-width);
      margin: 3rem auto;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 2rem;
      letter-spacing: -0.01em;
    }

    h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      letter-spacing: 0.02em;
    }

    h3 {
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
    }

    p { margin-bottom: 1.25rem; }

    a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    a:hover { color: var(--link-hover); }

    ul, ol { margin: 0 0 1.25rem 1.25rem; }
    li { margin-bottom: 0.4rem; }

    code {
      font-family: var(--font);
      font-size: 0.875em;
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 2px;
    }

    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      padding: 1.25rem;
      border-radius: 3px;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }

    pre code { background: none; padding: 0; font-size: 0.85rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }

    th {
      font-weight: 600;
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-bottom: 2px solid var(--border);
      letter-spacing: 0.03em;
    }

    td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }

    blockquote {
      border-left: 2px solid var(--border);
      padding-left: 1.25rem;
      color: var(--muted);
      margin: 0 0 1.25rem;
    }

    footer {
      max-width: var(--max-width);
      margin: 4rem auto 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <header>
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <a class="github-link" href="https://github.com/rhyannonjoy/agent-ecosystem-testing">GitHub ↗</a>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <span>{{ site.author }}</span>
    <span>{{ site.description }}</span>
  </footer>

</body>
</html>
